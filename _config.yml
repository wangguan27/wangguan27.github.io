# Welcome to Guan Wang's Academic Site Configuration

# Basic Site Settings
locale: "en-US"
site_theme: "default" 
title: "Guan Wang"
title_separator: "-"
name: &name "Guan Wang"
description: &description "Guan Wang - PhD Student at Rotman School of Management, University of Toronto."
url: "https://wangguan27.github.io" # 确保这是你的正确网址
baseurl: "" 
repository: "wangguan27/wangguan27.github.io" # 确保这是你的仓库路径

# Site Author - 这里的设置会显示在左侧边栏
author:
  # Biographic information
  avatar: "profile.png" # 记得稍后上传一张照片到根目录命名为 profile.png
  name: "Guan Wang (王冠)"
  pronouns: "She/Her"
  bio: "PhD Student in Operations Management"
  location: "Toronto, Canada"
  employer: "University of Toronto"
  uri: # 如果你有其他个人网站可以填这里
  email: "guan.wang@rotman.utoronto.ca" 

  # Academic websites
  academia: # URL
  arxiv: # URL
  googlescholar: # 建议稍后替换为你真实的 Google Scholar URL
  orcid: # 建议稍后替换为你真实的 ORCID URL
  researchgate: # URL

  # Repositories and software development
  github: "wangguan27"
  stackoverflow: # User number

  # Social media
  linkedin: "guan-wang" # 建议检查一下你的 LinkedIn ID 是否正确
  twitter: # Username for X
  weibo: # Username
  zhihu: # Username

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Working Papers' # 针对 PhD，我把这里改成了 Working Papers
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser: 
breadcrumbs: false 
words_per_minute: 160
future: true
read_more: "disabled" 
talkmap_link: true # 开启这个，之后可以展示你参加过的会议地图（如 INFORMS）

# Analytics (如果你以后想看访客统计，可以填 Google Analytics ID)
analytics:
  provider: "false" 

# Reading Files
include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .tmp
  - node_modules

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:slug/
  publications:
    output: true
    permalink: /:collection/:slug
  portfolio:
    output: true
    permalink: /:collection/:slug
  talks:
    output: true
    permalink: /:collection/:slug
  teaching:
    output: true
    permalink: /:collection/:slug

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Toronto

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji